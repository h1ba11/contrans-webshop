name: Static checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate catalog
        run: python tools/validate_catalog.py
      - name: Build fallback catalog
        run: python tools/build-fallback.py
